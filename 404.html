<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Page Not Found · Zeming's Control Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 20%, rgba(0, 84, 159, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 80% 80%, rgba(227, 0, 102, 0.18) 0%, transparent 45%),
                linear-gradient(135deg, #0f1f3a 0%, #002F5F 50%, #00549F 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; overflow: hidden; position: relative;
        }
        body::before, body::after {
            content: ''; position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.4;
            animation: float 18s ease-in-out infinite; pointer-events: none;
        }
        body::before {
            width: 380px; height: 380px; background: #00875A;
            top: -100px; left: -100px;
        }
        body::after {
            width: 460px; height: 460px; background: #E30066;
            bottom: -150px; right: -120px; animation-delay: -9s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -30px) scale(1.05); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.35);
        }
        .error-code {
            background: linear-gradient(135deg, #00549F 0%, #E30066 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .primary-btn {
            background: linear-gradient(135deg, #00549F 0%, #002F5F 100%);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(0, 84, 159, 0.5);
        }
    </style>
</head>
<body>
    <div class="w-full max-w-lg relative z-10">
        <div class="glass-card rounded-2xl p-8 sm:p-10 text-center">
            <h1 class="error-code text-7xl sm:text-8xl font-black tracking-tight">404</h1>
            <h2 class="text-xl sm:text-2xl font-bold text-slate-800 mt-3">Page Not Found</h2>
            <p class="text-sm text-slate-500 mt-3 leading-relaxed">
                Looks like this link took a wrong turn at Aachen.<br>
                The page you're looking for doesn't exist or has been moved.
            </p>

            <div class="mt-7 flex flex-col sm:flex-row gap-3 justify-center">
                <a href="/" class="primary-btn px-5 py-2.5 text-white font-bold rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="ph-fill ph-house"></i> Back to Home
                </a>
                <a href="/login.html" class="px-5 py-2.5 border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold rounded-xl text-sm flex items-center justify-center gap-2 transition-all">
                    <i class="ph ph-sign-in"></i> Sign in
                </a>
            </div>

            <p class="text-[11px] text-slate-400 mt-7 pt-5 border-t border-slate-100">
                If you believe this is a mistake, please contact the administrator.
            </p>
        </div>

        <p class="text-center text-xs text-blue-200/70 mt-5">
            &copy; 2026 Zeming Wang &middot; zemingwang.de
        </p>
    </div>
</body>
</html>
